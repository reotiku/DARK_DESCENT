<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>DARK DESCENT</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;height:100%;background:#000;overflow:hidden;touch-action:none;}
#wrap{display:flex;align-items:center;justify-content:center;width:100%;height:100%;}
canvas{display:block;image-rendering:pixelated;}
#btns{display:flex;justify-content:space-between;align-items:center;width:100%;padding:0 24px 12px;position:absolute;bottom:0;left:0;pointer-events:none;}
#stick-wrap{width:100px;height:100px;position:relative;pointer-events:all;}
#stick-base{width:100px;height:100px;border-radius:50%;border:2px solid rgba(255,255,255,0.2);background:rgba(255,255,255,0.06);position:absolute;}
#stick-knob{width:44px;height:44px;border-radius:50%;border:2px solid rgba(255,200,80,0.6);background:rgba(255,180,0,0.2);position:absolute;top:28px;left:28px;}
.gbtn{width:72px;height:72px;border-radius:50%;border:2px solid rgba(255,100,0,0.5);background:rgba(200,60,0,0.25);color:#fff;font-size:26px;display:flex;align-items:center;justify-content:center;user-select:none;pointer-events:all;}
.gbtn.pressed{background:rgba(255,80,0,0.5);}
</style>
</head>
<body>
<div id="wrap"><canvas id="c"></canvas></div>
<div id="btns">
  <div id="stick-wrap"><div id="stick-base"></div><div id="stick-knob"></div></div>
  <div class="gbtn" id="btn-shoot">🔫</div>
</div>
<script>
const C=document.getElementById('c'),ctx=C.getContext('2d');
const GW=320,GH=480;
let scale=1;
function resize(){
  const vw=window.innerWidth,vh=window.innerHeight;
  const avail='ontouchstart' in window?vh-100:vh;
  scale=Math.min(vw/GW,avail/GH);
  C.width=Math.round(GW*scale);C.height=Math.round(GH*scale);
  ctx.setTransform(scale,0,0,scale,0,0);
  const b=document.getElementById('btns');
  b.style.width=C.width+'px';b.style.left=((window.innerWidth-C.width)/2)+'px';
}
resize();window.addEventListener('resize',resize);

// INPUT
const keys={left:false,right:false,shoot:false};
let shootJustPressed=false,stickRatio=0;
window.addEventListener('keydown',e=>{
  if(e.code==='ArrowLeft'||e.code==='KeyA'){keys.left=true;stickRatio=-1;}
  if(e.code==='ArrowRight'||e.code==='KeyD'){keys.right=true;stickRatio=1;}
  if(e.code==='Space'||e.code==='KeyZ'){if(!keys.shoot)shootJustPressed=true;keys.shoot=true;}
  if(gamePhase==='title'||gamePhase==='gameover')initGame();
  e.preventDefault();
},{passive:false});
window.addEventListener('keyup',e=>{
  if(e.code==='ArrowLeft'||e.code==='KeyA'){keys.left=false;if(!keys.right)stickRatio=0;}
  if(e.code==='ArrowRight'||e.code==='KeyD'){keys.right=false;if(!keys.left)stickRatio=0;}
  if(e.code==='Space'||e.code==='KeyZ')keys.shoot=false;
});
const stickWrap=document.getElementById('stick-wrap'),stickKnob=document.getElementById('stick-knob');
const STICK_R=30;let stickTouchId=null;
function stickMove(cx){
  const r=stickWrap.getBoundingClientRect();
  const cl=Math.max(-STICK_R,Math.min(STICK_R,cx-(r.left+r.width/2)));
  stickKnob.style.transform=`translateX(${cl}px)`;
  stickRatio=cl/STICK_R;keys.left=stickRatio<-0.15;keys.right=stickRatio>0.15;
}
stickWrap.addEventListener('touchstart',e=>{e.preventDefault();if(stickTouchId!==null)return;const t=e.changedTouches[0];stickTouchId=t.identifier;stickMove(t.clientX);},{passive:false});
stickWrap.addEventListener('touchmove',e=>{e.preventDefault();for(const t of e.changedTouches)if(t.identifier===stickTouchId)stickMove(t.clientX);},{passive:false});
function stickRelease(e){for(const t of e.changedTouches)if(t.identifier===stickTouchId){stickTouchId=null;keys.left=false;keys.right=false;stickRatio=0;stickKnob.style.transform='translateX(0px)';}}
stickWrap.addEventListener('touchend',stickRelease,{passive:false});
stickWrap.addEventListener('touchcancel',stickRelease,{passive:false});
const shootEl=document.getElementById('btn-shoot');
shootEl.addEventListener('touchstart',e=>{e.preventDefault();keys.shoot=true;shootJustPressed=true;shootEl.classList.add('pressed');},{passive:false});
shootEl.addEventListener('touchend',e=>{e.preventDefault();keys.shoot=false;shootEl.classList.remove('pressed');},{passive:false});
shootEl.addEventListener('touchcancel',()=>{keys.shoot=false;shootEl.classList.remove('pressed');});
C.addEventListener('click',e=>{const r=C.getBoundingClientRect();handleOverlayClick((e.clientX-r.left)/scale,(e.clientY-r.top)/scale);});
C.addEventListener('touchend',e=>{e.preventDefault();const r=C.getBoundingClientRect(),t=e.changedTouches[0];handleOverlayClick((t.clientX-r.left)/scale,(t.clientY-r.top)/scale);},{passive:false});

// CONSTANTS
const PLAYER_W=14,PLAYER_H=18;
const BASE_GRAV=0.18,MAX_GRAV=0.52,FALL_ACCEL=0.0018,TERM_VEL=12;
const BASE_RECOIL=-3.8;
const STAGE_DEPTH=3000;
const PLAT_IMIN=180,PLAT_IMAX=260;
const ENEMY_ACTIVE_LIMIT=80;
// ゴール壁のHP（フロアごとにスケール）
const WALL_BASE_HP=80;

// WEAPONS（range追加）
const BASE_WEAPONS={
  pistol: {name:'PISTOL', color:'#4f4',bc:'#ff4',spd:10,rate:15,spread:0,   pellets:1,dmgM:1.0, recoil:BASE_RECOIL,    pierce:false,range:220,desc:'バランス型',detail:'単発・安定'},
  shotgun:{name:'SHOTGUN',color:'#f84',bc:'#f40',spd:8, rate:30,spread:0.25,pellets:5,dmgM:0.65,recoil:BASE_RECOIL*1.7,pierce:false,range:130,desc:'超近距離', detail:'5発・大反動'},
  smg:    {name:'SMG',    color:'#4af',bc:'#adf',spd:11,rate:5, spread:0.1, pellets:1,dmgM:0.3, recoil:BASE_RECOIL*0.3,pierce:false,range:180,desc:'高速連射', detail:'連射・低ダメ'},
  magnum: {name:'MAGNUM', color:'#fa6',bc:'#fc8',spd:13,rate:28,spread:0.05,pellets:6,dmgM:1.8, recoil:BASE_RECOIL*1.4,pierce:false,range:260,desc:'大口径6連',detail:'高威力・中連射'},
  sniper: {name:'SNIPER', color:'#f4f',bc:'#faf',spd:18,rate:45,spread:0,   pellets:5,dmgM:2.5, recoil:BASE_RECOIL*2.2,pierce:true, range:999,desc:'貫通5連射',detail:'貫通・超反動'},
};

const BONUS_POOL=[
  {id:'rate_s', name:'連射速度+5%', desc:'連射間隔-5%',    fn:w=>{w.rate=Math.max(2,Math.floor(w.rate*0.95));}},
  {id:'rate_m', name:'連射速度+10%',desc:'連射間隔-10%',   fn:w=>{w.rate=Math.max(2,Math.floor(w.rate*0.90));}},
  {id:'pellet', name:'弾数+1',      desc:'1射の弾数+1',    fn:w=>{w.pellets+=1;}},
  {id:'dmg_s',  name:'ダメージ+8%', desc:'武器倍率+0.08',  fn:w=>{w.dmgM=+(w.dmgM+0.08).toFixed(3);}},
  {id:'dmg_m',  name:'ダメージ+15%',desc:'武器倍率+0.15',  fn:w=>{w.dmgM=+(w.dmgM+0.15).toFixed(3);}},
  {id:'spread', name:'精度+',       desc:'ばらつき-20%',   fn:w=>{w.spread=+(w.spread*0.8).toFixed(3);}},
  {id:'spd',    name:'弾速+10%',    desc:'弾速+10%',       fn:w=>{w.spd=+(w.spd*1.1).toFixed(2);}},
  {id:'recoil', name:'反動強化+10%',desc:'反動+10%',       fn:w=>{w.recoil=+(w.recoil*1.1).toFixed(3);}},
  {id:'range_s',name:'射程+20%',   desc:'射程距離+20%',   fn:w=>{w.range=Math.floor(w.range*1.2);}},
  {id:'range_m',name:'射程+40%',   desc:'射程距離+40%',   fn:w=>{w.range=Math.floor(w.range*1.4);}},
];

const SHOP_POOL=[
  {name:'DMG ×1.5', desc:'ダメージ1.5倍',   price:f=>80+f*30,  fn:()=>{S.dmgMult*=1.5;}},
  {name:'DMG ×2',   desc:'ダメージ2倍!!',   price:f=>200+f*80, fn:()=>{S.dmgMult*=2;}},
  {name:'HP +50',   desc:'HP回復+50',        price:f=>60+f*20,  fn:()=>{S.hp=Math.min(S.maxHp,S.hp+50);}},
  {name:'MAX HP+100',desc:'最大HP+100',      price:f=>180+f*60, fn:()=>{S.maxHp+=100;S.hp=S.maxHp;}},
  {name:'COMBO PWR', desc:'コンボ倍率UP',    price:f=>120+f*40, fn:()=>{S.comboPwr+=0.15;}},
  {name:'GOLD DMG',  desc:'金×0.05=DMG加算',price:f=>150+f*50, fn:()=>{S.goldDmg=true;}},
];

const ENEMY_TYPES=[
  {type:'zombie',w:16,h:20,col:'#3a3',spd:0.8,sc:10,g:2,fly:false},
  {type:'demon', w:14,h:18,col:'#a22',spd:1.8,sc:15,g:4,fly:false},
  {type:'ghost', w:16,h:20,col:'#84f',spd:0.5,sc:20,g:5,fly:true},
  {type:'bat',   w:14,h:10,col:'#844',spd:2.5,sc:12,g:3,fly:true},
];
function enemyHp(fl){return Math.floor(30*Math.pow(2.8,fl-1));}
function enemyGold(fl,b){return Math.floor(b*Math.pow(1.5,fl-1));}
function enemyScore(fl,b){return Math.floor(b*Math.pow(2,fl-1));}

// STATE
let S=null,gamePhase='title',camY=0;
let platforms=[],enemies=[],bullets=[],ebullets=[],particles=[],dmgTexts=[],drops=[];
let goalWall=null; // ゴール壁オブジェクト
let frame=0;
let weaponChoices=[],shopItems=[],bonusChoices=[],selWeapon=null;

function initGame(){
  S={
    x:GW/2,y:60,vx:0,vy:0,onGround:false,
    hp:100,maxHp:100,
    floor:1,kills:0,gold:0,
    baseDmg:10,dmgMult:1,comboPwr:0.1,combo:0,comboTimer:0,goldDmg:false,
    weapon:'pistol',
    wStats:JSON.parse(JSON.stringify(BASE_WEAPONS)),
    fireTimer:0,invincible:0,totalDmg:0,score:0,
    isBoss:false,bossKilled:false,
    gravity:BASE_GRAV,fallTime:0,
    floorDone:false,
    killsThisStage:0,
  };
  camY=0;
  buildStage();
  gamePhase='playing';
}

// STAGE BUILDER
function buildStage(){
  platforms=[];enemies=[];bullets=[];ebullets=[];particles=[];dmgTexts=[];drops=[];
  S.x=GW/2;S.y=60;S.vx=0;S.vy=0;S.onGround=false;
  S.gravity=BASE_GRAV;S.fallTime=0;
  S.floorDone=false;S.bossKilled=false;
  S.killsThisStage=0;
  camY=0;

  const fl=S.floor;

  // 開始足場
  platforms.push({x:GW/2-40,y:110,w:80,h:10});

  if(S.isBoss){
    for(let i=0;i<8;i++){
      const y=160+i*280+Math.random()*80;
      const w=60+Math.random()*80,x=Math.random()*(GW-w-20)+10;
      platforms.push({x,y,w,h:10});
    }
    spawnBoss(GW/2,300);
  } else {
    let depth=110;
    const platList=[];
    while(depth<STAGE_DEPTH-200){
      const interval=PLAT_IMIN+Math.random()*(PLAT_IMAX-PLAT_IMIN);
      depth+=interval;
      const w=45+Math.random()*75,x=Math.random()*(GW-w-20)+10;
      platforms.push({x,y:depth,w,h:10});
      platList.push({x,y:depth,w});
    }
    const density=Math.min(0.4+fl*0.07,0.92);
    platList.forEach(p=>{
      if(Math.random()<density) spawnEnemyAt(p.x+Math.random()*p.w, p.y, p);
      if(Math.random()<density*0.8) spawnEnemyAt(p.x+(Math.random()-.5)*60+p.w/2, p.y+50+Math.random()*70, null);
      if(fl>=3&&Math.random()<Math.min(fl*0.05,0.6)) spawnEnemyAt(Math.random()*(GW-30)+15, p.y+20+Math.random()*80, null);
    });
  }

  // ゴール壁（射撃で壊す）
  const wallHp=Math.floor(WALL_BASE_HP*Math.pow(1.8,fl-1));
  goalWall={
    x:0, y:STAGE_DEPTH,
    w:GW, h:24,
    hp:wallHp, maxHp:wallHp,
    broken:false,
    shakeX:0,
    flashTimer:0,
  };
}

function spawnBoss(x,y){
  const fl=S.floor;
  const hp=Math.floor(500*Math.pow(3.0,fl-1));
  enemies.push({type:'boss',x,y,vx:1.8+fl*0.3,vy:0,w:40,h:40,
    hp,maxHp:hp,col:'#c00',dead:false,
    shootTimer:Math.max(20,50-fl*3),phase:1,
    g:100+fl*50,sc:500+fl*200});
}

function spawnEnemyAt(x,y,plat){
  const fl=S.floor;
  const t=ENEMY_TYPES[Math.floor(Math.random()*ENEMY_TYPES.length)];
  const hp=enemyHp(fl);
  const spd=t.spd*(1+fl*0.12);
  const ey=plat?(plat.y-t.h/2-1):y;
  enemies.push({type:t.type,w:t.w,h:t.h,col:t.col,spd,
    sc:enemyScore(fl,t.sc),g:enemyGold(fl,t.g),fly:t.fly,
    x,y:ey,vx:(Math.random()-.5)*spd*2,vy:0,
    hp,maxHp:hp,dead:false,
    homePlat:plat||null,
    shootTimer:Math.max(20,80-fl*4)+Math.random()*40});
}

// DROPS
function tryDropHeart(x,y){
  if(Math.random()<0.15) drops.push({type:'heart',x,y,vy:-2,life:300,collected:false});
}

// COMBAT
function getW(){return S.wStats[S.weapon];}
function calcDmg(){
  let d=S.baseDmg*S.dmgMult*getW().dmgM;
  if(S.goldDmg) d+=S.gold*0.05;
  if(S.combo>=3) d*=(1+S.combo*S.comboPwr);
  d*=Math.pow(1.1,S.floor-1);
  return Math.max(1,Math.floor(d));
}
function hitEnemy(e,dmg){
  e.hp-=dmg;S.totalDmg+=dmg;S.combo++;S.comboTimer=100;
  const sz=Math.min(8+Math.log10(Math.max(dmg,1))*5,28);
  dmgTexts.push({x:e.x,y:e.y-10,val:dmg,life:40,vy:-1.5,sz,alpha:1});
  for(let i=0;i<6;i++) spawnPtcl(e.x,e.y,e.col);
  if(e.hp<=0) killEnemy(e);
}
function killEnemy(e){
  e.dead=true;S.kills++;S.killsThisStage++;
  S.gold+=e.g||0;S.score+=e.sc||0;
  for(let i=0;i<18;i++) spawnPtcl(e.x,e.y,'#fd0');
  tryDropHeart(e.x,e.y);
  if(e.type==='boss'){
    S.bossKilled=true;
    S.baseDmg=Math.floor(S.baseDmg*2.0);
    for(let i=0;i<40;i++) spawnPtcl(e.x,e.y+(Math.random()-.5)*50,'#f40');
    triggerBonusSelect();
    return;
  }
  if(S.killsThisStage>0&&S.killsThisStage%5===0) triggerBonusSelect();
}
function spawnPtcl(x,y,col){
  particles.push({x,y,vx:(Math.random()-.5)*5,vy:-Math.random()*5,life:20+Math.random()*10,col,r:2+Math.random()*2});
}
function shoot(){
  const w=getW(),dmg=calcDmg();
  // rangeをlifeに変換（speed/frame = px/frame → life = range/spd）
  const life=Math.ceil(w.range/w.spd);
  for(let i=0;i<w.pellets;i++){
    const a=Math.PI/2+(Math.random()-.5)*w.spread*2;
    bullets.push({x:S.x,y:S.y+PLAYER_H/2,vx:Math.cos(a)*w.spd,vy:Math.sin(a)*w.spd,
      dmg,col:w.bc,pierce:w.pierce,hit:[],life,dead:false,
      startY:S.y+PLAYER_H/2}); // startYで射程計算
  }
  S.vy+=w.recoil;S.onGround=false;
  for(let i=0;i<4;i++) spawnPtcl(S.x,S.y+PLAYER_H/2,w.color);
}

// BONUS SELECT
function triggerBonusSelect(){
  bonusChoices=BONUS_POOL.slice().sort(()=>Math.random()-.5).slice(0,3);
  gamePhase='bonusSelect';
}

// UPDATE
function update(){
  if(gamePhase!=='playing'&&gamePhase!=='bossWarn') return;
  frame++;

  if(S.onGround){S.fallTime=0;S.gravity=BASE_GRAV;}
  else{S.fallTime++;S.gravity=Math.min(MAX_GRAV,BASE_GRAV+S.fallTime*FALL_ACCEL);}

  const absR=Math.abs(stickRatio);
  const ss=absR<0.15?0:Math.pow((absR-0.15)/0.85,1.4);
  if(keys.left) S.vx+=(-3.2*ss-S.vx)*0.2;
  else if(keys.right) S.vx+=(3.2*ss-S.vx)*0.2;
  else S.vx*=0.72;

  S.vy+=S.gravity;
  S.vy=Math.max(S.vy,-18);S.vy=Math.min(S.vy,TERM_VEL);
  S.x+=S.vx;S.y+=S.vy;S.onGround=false;
  S.x=Math.max(PLAYER_W/2,Math.min(GW-PLAYER_W/2,S.x));

  // プラットフォーム衝突（ゴール壁は別処理）
  if(S.vy>0){
    for(const p of platforms){
      if(S.x+PLAYER_W/2>p.x&&S.x-PLAYER_W/2<p.x+p.w){
        const bot=S.y+PLAYER_H/2,prev=bot-S.vy;
        if(prev<=p.y&&bot>=p.y){S.y=p.y-PLAYER_H/2;S.vy=0;S.onGround=true;break;}
      }
    }
  }

  // ゴール壁との衝突（常に足場として機能、壊れたら通過可能）
  if(goalWall&&!goalWall.broken&&S.vy>0){
    const gw=goalWall;
    if(S.x+PLAYER_W/2>gw.x&&S.x-PLAYER_W/2<gw.x+gw.w){
      const bot=S.y+PLAYER_H/2,prev=bot-S.vy;
      if(prev<=gw.y&&bot>=gw.y){
        S.y=gw.y-PLAYER_H/2;S.vy=0;S.onGround=true;
      }
    }
  }
  // ゴール壁が壊れた後にプレイヤーが通過
  if(goalWall&&goalWall.broken&&!S.floorDone&&S.y>STAGE_DEPTH+10){
    S.floorDone=true;triggerStageComplete();return;
  }

  // ゴール壁フラッシュタイマー
  if(goalWall&&goalWall.flashTimer>0) goalWall.flashTimer--;

  const tgt=S.y-GH*0.35;
  camY+=(tgt-camY)*0.12;
  camY=Math.max(0,camY);

  if(S.fireTimer>0) S.fireTimer--;
  const w=getW();
  const smgAuto=S.weapon==='smg'&&keys.shoot;
  if((shootJustPressed||smgAuto)&&S.fireTimer===0){shoot();S.fireTimer=w.rate;}
  shootJustPressed=false;

  // drops
  for(const d of drops){
    if(d.collected) continue;
    d.y+=d.vy;d.vy+=0.2;d.life--;
    for(const p of platforms){
      if(!p.isGoal&&d.x>p.x&&d.x<p.x+p.w){
        const bot=d.y+6;if(bot>=p.y&&bot-d.vy<p.y){d.y=p.y-6;d.vy=0;}
      }
    }
    if(Math.abs(d.x-S.x)<14&&Math.abs(d.y-S.y)<14){
      d.collected=true;
      const heal=Math.floor(S.maxHp*0.2);
      S.hp=Math.min(S.maxHp,S.hp+heal);
      for(let i=0;i<12;i++) spawnPtcl(d.x,d.y,'#f66');
      dmgTexts.push({x:d.x,y:d.y-10,val:`+${heal}HP`,life:50,vy:-1.2,sz:12,alpha:1,isText:true,col:'#f88'});
    }
  }
  drops=drops.filter(d=>!d.collected&&d.life>0);

  // bullets
  for(const b of bullets){
    b.x+=b.vx;b.y+=b.vy;b.life--;
    if(b.life<=0){b.dead=true;continue;}

    // ゴール壁への命中
    if(goalWall&&!goalWall.broken){
      const gw=goalWall;
      if(b.y+4>=gw.y&&b.y-4<=gw.y+gw.h&&b.x>gw.x&&b.x<gw.x+gw.w){
        if(S.isBoss&&!S.bossKilled){
          // ボスフロアは壁ダメージなし
        } else {
          gw.hp-=b.dmg;
          gw.flashTimer=4;
          gw.shakeX=(Math.random()-.5)*4;
          for(let i=0;i<5;i++) spawnPtcl(b.x,gw.y,'#888');
          if(gw.hp<=0){
            gw.broken=true;
            gw.hp=0;
            // 壁破壊パーティクル
            for(let i=0;i<40;i++) spawnPtcl(Math.random()*GW,gw.y+(Math.random()-.5)*12,'#aaa');
            for(let i=0;i<20;i++) spawnPtcl(Math.random()*GW,gw.y+(Math.random()-.5)*12,'#ff4');
            dmgTexts.push({x:GW/2,y:gw.y-20,val:'WALL BROKEN!',life:80,vy:-0.5,sz:14,alpha:1,isText:true,col:'#ff4'});
          }
        }
        if(!b.pierce) b.dead=true;
        continue;
      }
    }

    // 敵への命中
    for(const e of enemies){
      if(e.dead) continue;
      if(b.pierce&&b.hit.includes(e)) continue;
      if(Math.abs(b.x-e.x)<e.w/2+4&&Math.abs(b.y-e.y)<e.h/2+4){
        hitEnemy(e,b.dmg);
        if(b.pierce) b.hit.push(e); else b.dead=true;
        break;
      }
    }
  }
  bullets=bullets.filter(b=>!b.dead);

  // enemies
  let activeCount=0;
  for(const e of enemies){
    if(e.dead) continue;
    const onScreen=e.y>camY-100&&e.y<camY+GH+100;
    if(!onScreen) continue;
    activeCount++;
    if(activeCount>ENEMY_ACTIVE_LIMIT) break;

    if(e.type==='boss'){
      const ty=S.y+110;
      e.y+=(ty-e.y)*0.05;
      e.y=Math.max(camY+100,Math.min(camY+GH-60,e.y));
      e.x+=e.vx;if(e.x<30||e.x>GW-30)e.vx*=-1;
      e.shootTimer--;
      if(e.shootTimer<=0){
        e.shootTimer=Math.max(12,50-S.floor*3);
        const ang=Math.atan2(S.y-e.y,S.x-e.x);
        const shots=e.phase>=2?5:e.phase>=1.5?3:2;
        for(let i=0;i<shots;i++){
          const a=ang+(i-(shots-1)/2)*0.3;
          const sp=3+S.floor*0.3;
          ebullets.push({x:e.x,y:e.y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:130,dead:false});
        }
      }
      if(e.hp<e.maxHp*0.3)e.phase=2; else if(e.hp<e.maxHp*0.6)e.phase=1.5;
      if(S.invincible<=0&&Math.abs(e.x-S.x)<e.w/2+PLAYER_W/2&&Math.abs(e.y-S.y)<e.h/2+PLAYER_H/2){
        S.hp-=15+S.floor*2;S.invincible=60;if(S.hp<=0){gamePhase='gameover';return;}
      }
    } else {
      if(e.fly){
        e.x+=e.vx;
        const lx=e.homePlat?e.homePlat.x:10;
        const rx=e.homePlat?e.homePlat.x+e.homePlat.w:GW-10;
        if(e.x<lx||e.x>rx)e.vx*=-1;
        e.y+=Math.sin(frame*0.04+e.x*0.08)*0.8;
        const dx=S.x-e.x,dy=S.y-e.y,dist=Math.sqrt(dx*dx+dy*dy);
        if(dist<80){e.x+=dx*0.008;e.y+=dy*0.008;}
      } else {
        e.vy+=BASE_GRAV*0.9;
        e.x+=e.vx;
        // homePlatの範囲で折り返す
        if(e.homePlat){
          if(e.x<e.homePlat.x+4||e.x>e.homePlat.x+e.homePlat.w-4)e.vx*=-1;
        } else {
          if(e.x<10||e.x>GW-10)e.vx*=-1;
        }
        e.y+=e.vy;
        // 全足場 + ゴール壁に着地判定
        const allFloors=[...platforms];
        if(goalWall&&!goalWall.broken) allFloors.push({x:goalWall.x,y:goalWall.y,w:goalWall.w});
        for(const p of allFloors){
          if(e.x+e.w/2>p.x&&e.x-e.w/2<p.x+p.w){
            const bot=e.y+e.h/2,prev=bot-e.vy;
            if(e.vy>=0&&prev<=p.y&&bot>=p.y){
              e.y=p.y-e.h/2;e.vy=0;break;
            }
          }
        }
      }
      if(e.type==='demon'||e.type==='ghost'||S.floor>=3){
        e.shootTimer--;
        if(e.shootTimer<=0){
          e.shootTimer=Math.max(15,80-S.floor*4)+Math.random()*30;
          const ang=Math.atan2(S.y-e.y,S.x-e.x);
          const sp=2+S.floor*0.2;
          ebullets.push({x:e.x,y:e.y,vx:Math.cos(ang)*sp,vy:Math.sin(ang)*sp,life:110,dead:false});
        }
      }
      if(S.invincible<=0&&Math.abs(e.x-S.x)<e.w/2+PLAYER_W/2&&Math.abs(e.y-S.y)<e.h/2+PLAYER_H/2){
        S.hp-=5+S.floor*1.5;S.invincible=45;if(S.hp<=0){gamePhase='gameover';return;}
      }
    }
  }
  enemies=enemies.filter(e=>!e.dead);

  for(const b of ebullets){
    b.x+=b.vx;b.y+=b.vy;b.life--;
    if(b.life<=0){b.dead=true;continue;}
    if(S.invincible<=0&&Math.abs(b.x-S.x)<10&&Math.abs(b.y-S.y)<10){
      S.hp-=8+S.floor*2;b.dead=true;S.invincible=35;if(S.hp<=0){gamePhase='gameover';return;}
    }
  }
  ebullets=ebullets.filter(b=>!b.dead);

  for(const p of particles){p.x+=p.vx;p.y+=p.vy;p.vy+=0.15;p.life--;p.r*=0.93;}
  particles=particles.filter(p=>p.life>0);
  for(const d of dmgTexts){d.y+=d.vy;d.vy*=0.92;d.life--;d.alpha=d.life/40;}
  dmgTexts=dmgTexts.filter(d=>d.life>0);
  if(S.invincible>0)S.invincible--;
  if(S.comboTimer>0)S.comboTimer--; else if(S.combo>0)S.combo=0;
}

// STAGE COMPLETE
function triggerStageComplete(){
  const nextFloor=S.floor+1;
  if(nextFloor%4===0){
    const wk=Object.keys(BASE_WEAPONS);
    weaponChoices=[{key:S.weapon,...S.wStats[S.weapon],keep:true}];
    while(weaponChoices.length<4){
      const k=wk[Math.floor(Math.random()*wk.length)];
      if(!weaponChoices.find(c=>c.key===k)) weaponChoices.push({key:k,...BASE_WEAPONS[k],keep:false});
    }
    // 武器選択後にもボーナスを選ぶのでbonusChoicesを準備
    bonusChoices=BONUS_POOL.slice().sort(()=>Math.random()-.5).slice(0,3);
    selWeapon=null;
    gamePhase='weaponSelect';
  } else if(nextFloor%3===0){
    S.floor++;S.isBoss=(S.floor%5===0);S.baseDmg=Math.floor(S.baseDmg*1.12);
    shopItems=SHOP_POOL.slice().sort(()=>Math.random()-.5).slice(0,3).map(item=>({...item,price:item.price(S.floor),bought:false}));
    gamePhase='shop';
  } else {
    // 通常クリア → ボーナス選択してから次ステージ
    bonusChoices=BONUS_POOL.slice().sort(()=>Math.random()-.5).slice(0,3);
    gamePhase='stageBonus';
  }
}

function startNextStage(){
  S.floor++;S.isBoss=(S.floor%5===0);S.baseDmg=Math.floor(S.baseDmg*1.12);
  buildStage();
  if(S.isBoss){gamePhase='bossWarn';setTimeout(()=>{if(gamePhase==='bossWarn')gamePhase='playing';},2200);}
  else gamePhase='playing';
}

// OVERLAY CLICK
const WC={cw:70,ch:95,gap:6,sx:()=>(GW-(70*4+6*3))/2,sy:60};
const SHOP_BY=GH/2-60;
const BC_SY=GH/2-30; // bonusカードのsy

function handleOverlayClick(mx,my){
  if(gamePhase==='title'||gamePhase==='gameover'){initGame();return;}

  // 5kill/ボスボーナス
  if(gamePhase==='bonusSelect'){
    const cw=88,ch=80,gap=8,total=cw*3+gap*2,sx=(GW-total)/2,sy=BC_SY;
    for(let i=0;i<bonusChoices.length;i++){
      const cx=sx+i*(cw+gap);
      if(mx>=cx&&mx<cx+cw&&my>=sy&&my<sy+ch){
        bonusChoices[i].fn(S.wStats[S.weapon]);
        dmgTexts.push({x:GW/2,y:200,val:bonusChoices[i].name,life:80,vy:-0.5,sz:11,alpha:1,isText:true,col:'#fa0'});
        gamePhase='playing';return;
      }
    }
    return;
  }

  // 通常ステージクリアボーナス
  if(gamePhase==='stageBonus'){
    const cw=88,ch=80,gap=8,total=cw*3+gap*2,sx=(GW-total)/2,sy=BC_SY;
    for(let i=0;i<bonusChoices.length;i++){
      const cx=sx+i*(cw+gap);
      if(mx>=cx&&mx<cx+cw&&my>=sy&&my<sy+ch){
        bonusChoices[i].fn(S.wStats[S.weapon]);
        startNextStage();return;
      }
    }
    return;
  }

  if(gamePhase==='weaponSelect'){
    if(selWeapon===null){
      const sx=WC.sx();
      for(let i=0;i<weaponChoices.length;i++){
        const cx=sx+i*(WC.cw+WC.gap);
        if(mx>=cx&&mx<cx+WC.cw&&my>=WC.sy&&my<WC.sy+WC.ch){selWeapon=weaponChoices[i].key;return;}
      }
    } else {
      const cw=88,ch=80,gap=8,total=cw*3+gap*2,sx=(GW-total)/2,sy=175;
      for(let i=0;i<bonusChoices.length;i++){
        const cx=sx+i*(cw+gap);
        if(mx>=cx&&mx<cx+cw&&my>=sy&&my<sy+ch){
          if(!S.wStats[selWeapon]) S.wStats[selWeapon]=JSON.parse(JSON.stringify(BASE_WEAPONS[selWeapon]));
          S.weapon=selWeapon;
          bonusChoices[i].fn(S.wStats[S.weapon]);
          startNextStage();selWeapon=null;return;
        }
      }
    }
    return;
  }

  if(gamePhase==='shop'){
    for(let i=0;i<shopItems.length;i++){
      const item=shopItems[i];
      const bx=GW/2-95,by=SHOP_BY+i*58,bw=190,bh=48;
      if(mx>=bx&&mx<bx+bw&&my>=by&&my<by+bh&&!item.bought&&S.gold>=item.price){
        S.gold-=item.price;item.fn();item.bought=true;
      }
    }
    if(mx>=GW/2-55&&mx<GW/2+55&&my>=GH-62&&my<GH-36) startNextStage();
  }
}

// DRAW
function draw(){
  if(!S){drawTitle();return;}
  ctx.clearRect(0,0,GW,GH);
  const dr=Math.min((S.floor-1)/20,1);
  ctx.fillStyle=`rgb(${8+dr*30|0},8,${15+dr*5|0})`;ctx.fillRect(0,0,GW,GH);
  ctx.strokeStyle='rgba(60,0,80,0.12)';ctx.lineWidth=1;
  for(let i=0;i<GW;i+=32){ctx.beginPath();ctx.moveTo(i,0);ctx.lineTo(i,GH);ctx.stroke();}

  if(gamePhase==='playing'||gamePhase==='bossWarn'){
    const prog=Math.min(S.y/STAGE_DEPTH,1);
    ctx.fillStyle='rgba(0,0,0,0.5)';ctx.fillRect(GW-10,0,8,GH);
    ctx.fillStyle=S.isBoss?(S.bossKilled?'#4f4':'#f44'):'#48f';
    ctx.fillRect(GW-10,0,8,GH*prog);
    ctx.fillStyle='rgba(255,255,255,0.4)';ctx.font='6px monospace';ctx.textAlign='center';
    ctx.fillText(S.isBoss?'BOSS':'NEXT',GW-6,GH-4);ctx.textAlign='left';
  }

  ctx.save();ctx.translate(0,-camY);

  // platforms
  for(const p of platforms){
    if(p.y+20<camY||p.y>camY+GH+20) continue;
    ctx.fillStyle='#1a0a28';ctx.fillRect(p.x,p.y,p.w,10);
    ctx.fillStyle='#3a1a5a';ctx.fillRect(p.x,p.y,p.w,3);
    ctx.fillStyle='rgba(90,40,130,0.18)';
    for(let bx=p.x+4;bx<p.x+p.w-4;bx+=16)ctx.fillRect(bx,p.y+3,14,6);
  }

  // ゴール壁
  if(goalWall&&!goalWall.broken){
    const gw=goalWall;
    const hpRatio=gw.hp/gw.maxHp;
    const sx=gw.shakeX*(gw.flashTimer>0?1:0);
    // 壁本体
    ctx.fillStyle=gw.flashTimer>0?'#fff':`rgb(${Math.floor(60+hpRatio*100)},${Math.floor(hpRatio*60)},${Math.floor(hpRatio*60)})`;
    ctx.fillRect(gw.x+sx,gw.y,gw.w,gw.h);
    // 亀裂表現（HPが減ると増える）
    const crackCount=Math.floor((1-hpRatio)*12);
    ctx.strokeStyle='rgba(0,0,0,0.6)';ctx.lineWidth=1;
    for(let i=0;i<crackCount;i++){
      const cx=(i+1)*(GW/(crackCount+1))+sx;
      ctx.beginPath();ctx.moveTo(cx,gw.y);ctx.lineTo(cx+(Math.random()-.5)*10,gw.y+gw.h);ctx.stroke();
    }
    // HPバー
    ctx.fillStyle='rgba(0,0,0,0.5)';ctx.fillRect(gw.x+sx,gw.y-7,gw.w,5);
    ctx.fillStyle=hpRatio>0.5?'#f84':hpRatio>0.25?'#fa0':'#f00';
    ctx.fillRect(gw.x+sx,gw.y-7,gw.w*hpRatio,5);
    // ラベル
    ctx.fillStyle='#fff';ctx.font='bold 9px monospace';ctx.textAlign='center';
    if(S.isBoss&&!S.bossKilled){
      ctx.fillStyle='#f44';ctx.fillText('⚠ BOSS FIRST ⚠',GW/2+sx,gw.y+16);
    } else {
      ctx.fillText(`WALL  ${gw.hp.toLocaleString()} / ${gw.maxHp.toLocaleString()}`,GW/2+sx,gw.y+16);
    }
    ctx.textAlign='left';
    // shakeをリセット
    if(gw.flashTimer<=0) gw.shakeX*=0.7;
  }

  // drops
  for(const d of drops){
    if(d.collected||d.y+8<camY||d.y-8>camY+GH) continue;
    const pulse=1+Math.sin(frame*0.12)*0.1;
    ctx.save();ctx.translate(d.x,d.y);ctx.scale(pulse,pulse);
    ctx.fillStyle='#f33';ctx.shadowColor='#f88';ctx.shadowBlur=6;
    ctx.font='14px serif';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText('♥',0,0);ctx.restore();ctx.textBaseline='alphabetic';
  }

  // particles
  for(const p of particles){
    ctx.globalAlpha=Math.max(0,p.life/30);
    ctx.fillStyle=p.col;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();
  }
  ctx.globalAlpha=1;

  for(const b of ebullets){
    ctx.fillStyle='#f60';ctx.beginPath();ctx.arc(b.x,b.y,4,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='rgba(255,80,0,0.2)';ctx.beginPath();ctx.arc(b.x,b.y,7,0,Math.PI*2);ctx.fill();
  }
  for(const b of bullets){
    ctx.fillStyle=b.col;ctx.beginPath();ctx.arc(b.x,b.y,3,0,Math.PI*2);ctx.fill();
  }

  // enemies
  for(const e of enemies){
    if(e.dead||e.y+40<camY||e.y-40>camY+GH) continue;
    const ef=frame%6<3&&e.hp<e.maxHp;
    ctx.fillStyle=ef?'#fff':e.col;
    if(e.type==='boss'){
      const s2=1+Math.sin(frame*0.05)*0.05;
      ctx.save();ctx.translate(e.x,e.y);ctx.scale(s2,s2);
      ctx.fillStyle=ef?'#fff':e.col;ctx.beginPath();ctx.arc(0,0,20,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#800';
      ctx.beginPath();ctx.moveTo(-14,-14);ctx.lineTo(-8,-28);ctx.lineTo(-2,-16);ctx.fill();
      ctx.beginPath();ctx.moveTo(14,-14);ctx.lineTo(8,-28);ctx.lineTo(2,-16);ctx.fill();
      ctx.fillStyle='#f00';ctx.beginPath();ctx.arc(-8,-4,5,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.arc(8,-4,5,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#ff0';ctx.beginPath();ctx.arc(-8,-4,2,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.arc(8,-4,2,0,Math.PI*2);ctx.fill();
      ctx.restore();
      ctx.fillStyle='#300';ctx.fillRect(e.x-35,e.y-42,70,6);
      ctx.fillStyle=e.phase>=2?'#f80':e.phase>=1.5?'#fa0':'#f00';
      ctx.fillRect(e.x-35,e.y-42,70*(e.hp/e.maxHp),6);
      ctx.fillStyle='#fff';ctx.font='7px monospace';ctx.textAlign='center';
      ctx.fillText(`DARK LORD FL${S.floor}`,e.x,e.y+34);
      ctx.fillStyle='#f88';ctx.font='6px monospace';
      ctx.fillText(e.hp.toLocaleString()+'/'+e.maxHp.toLocaleString(),e.x,e.y-46);
      ctx.textAlign='left';
    } else {
      ctx.fillRect(e.x-e.w/2,e.y-e.h/2,e.w,e.h);
      ctx.fillStyle='#fff';ctx.fillRect(e.x-5,e.y-e.h/2+3,4,4);ctx.fillRect(e.x+1,e.y-e.h/2+3,4,4);
      ctx.fillStyle='#000';ctx.fillRect(e.x-4,e.y-e.h/2+4,2,2);ctx.fillRect(e.x+2,e.y-e.h/2+4,2,2);
      if(e.type==='ghost'){ctx.fillStyle='rgba(180,120,255,0.25)';ctx.beginPath();ctx.arc(e.x,e.y,e.w,0,Math.PI*2);ctx.fill();}
      if(e.type==='bat'){
        ctx.fillStyle=e.col;
        ctx.beginPath();ctx.moveTo(e.x-12,e.y);ctx.lineTo(e.x-6,e.y-8);ctx.lineTo(e.x,e.y);ctx.fill();
        ctx.beginPath();ctx.moveTo(e.x+12,e.y);ctx.lineTo(e.x+6,e.y-8);ctx.lineTo(e.x,e.y);ctx.fill();
      }
      if(e.hp<e.maxHp){
        ctx.fillStyle='#300';ctx.fillRect(e.x-e.w/2,e.y-e.h/2-5,e.w,3);
        ctx.fillStyle='#f00';ctx.fillRect(e.x-e.w/2,e.y-e.h/2-5,e.w*(e.hp/e.maxHp),3);
      }
    }
  }

  // player
  if(!(S.invincible>0&&frame%4<2)){
    ctx.fillStyle='#8a0022';
    ctx.beginPath();ctx.moveTo(S.x-5,S.y-4);ctx.lineTo(S.x-14,S.y+12);ctx.lineTo(S.x-2,S.y+6);ctx.fill();
    ctx.fillStyle='#2244aa';ctx.fillRect(S.x-PLAYER_W/2,S.y-PLAYER_H/2,PLAYER_W,PLAYER_H);
    ctx.fillStyle='#f0c080';ctx.beginPath();ctx.arc(S.x,S.y-PLAYER_H/2-5,7,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#777';ctx.fillRect(S.x-2,S.y+2,4,10);
    if(S.fireTimer>getW().rate-5){
      ctx.fillStyle='#ff8';ctx.beginPath();ctx.arc(S.x,S.y+PLAYER_H/2+10,5,0,Math.PI*2);ctx.fill();
    }
  }

  ctx.textAlign='center';
  for(const d of dmgTexts){
    ctx.globalAlpha=Math.max(0,d.alpha);
    if(d.isText){ctx.fillStyle=d.col||'#f88';ctx.font=`bold ${d.sz}px monospace`;ctx.fillText(d.val,d.x,d.y);}
    else{
      ctx.fillStyle=d.val>1000000?'#f0f':d.val>100000?'#f40':d.val>10000?'#fd0':'#fff';
      ctx.font=`bold ${d.sz}px monospace`;ctx.fillText(d.val.toLocaleString(),d.x,d.y);
    }
  }
  ctx.globalAlpha=1;ctx.textAlign='left';
  ctx.restore();
  drawHUD();drawOverlay();
}

function drawHUD(){
  if(!S) return;
  ctx.fillStyle='rgba(0,0,0,0.55)';ctx.fillRect(5,5,110,11);
  ctx.fillStyle='#c22';ctx.fillRect(5,5,110*(S.hp/S.maxHp),11);
  ctx.fillStyle='#f88';ctx.font='8px monospace';ctx.fillText(`HP ${Math.ceil(S.hp)}/${S.maxHp}`,7,14);
  ctx.fillStyle='#adf';ctx.fillText(`FL:${S.floor}${S.isBoss?' 👹':''}`,5,28);
  ctx.fillStyle='#fff';ctx.fillText(`DMG:${calcDmg().toLocaleString()}`,5,38);
  ctx.fillStyle='#4f8';ctx.fillText(`${getW().name} R:${getW().range}`,5,48);
  ctx.fillStyle='#fd8';ctx.fillText(`G:${S.gold}`,5,58);
  ctx.fillStyle='#faf';ctx.fillText(`KILLS:${S.kills}`,5,68);
  const toNext=5-(S.killsThisStage%5)||5;
  ctx.fillStyle='#fa0';ctx.fillText(`ボーナスまで:${toNext}kill`,5,78);
  const fp=(S.gravity-BASE_GRAV)/(MAX_GRAV-BASE_GRAV);
  if(fp>0.05){
    ctx.fillStyle='rgba(0,0,0,0.5)';ctx.fillRect(GW-46,5,40,6);
    ctx.fillStyle=`rgb(${200+fp*55|0},${200-fp*180|0},0)`;ctx.fillRect(GW-46,5,40*fp,6);
  }
  if(S.combo>=3){
    ctx.fillStyle='#ff4';ctx.font=`bold ${Math.min(10+S.combo,20)}px monospace`;ctx.textAlign='right';
    ctx.fillText(`${S.combo} COMBO!`,GW-12,22);
    ctx.font='8px monospace';ctx.fillText(`×${(1+S.combo*S.comboPwr).toFixed(1)}DMG`,GW-12,33);
    ctx.textAlign='left';
  }
}

function drawBonusCards(title,sub,sy,borderCol){
  ctx.fillStyle='rgba(0,0,0,0.92)';ctx.fillRect(0,0,GW,GH);
  ctx.textAlign='center';
  ctx.fillStyle='#ff4';ctx.font='bold 13px monospace';ctx.fillText(title,GW/2,50);
  ctx.fillStyle='#aaa';ctx.font='8px monospace';ctx.fillText(sub,GW/2,68);
  const cw=88,ch=80,gap=8,total=cw*3+gap*2,sx=(GW-total)/2;
  bonusChoices.forEach((b,i)=>{
    const cx=sx+i*(cw+gap);
    ctx.fillStyle='#111';ctx.fillRect(cx,sy,cw,ch);
    ctx.strokeStyle=borderCol;ctx.lineWidth=1;ctx.strokeRect(cx,sy,cw,ch);
    ctx.fillStyle=borderCol;ctx.font='bold 8px monospace';ctx.fillText(b.name,cx+cw/2,sy+22);
    ctx.fillStyle='#888';ctx.font='7px monospace';ctx.fillText(b.desc,cx+cw/2,sy+40);
  });
  ctx.textAlign='left';
}

function drawOverlay(){
  if(gamePhase==='playing') return;
  if(gamePhase==='bossWarn'){
    ctx.fillStyle='rgba(0,0,0,0.7)';ctx.fillRect(0,0,GW,GH);
    ctx.fillStyle='#f00';ctx.font=`bold ${14+Math.sin(frame*0.25)*3|0}px monospace`;ctx.textAlign='center';
    ctx.fillText('⚠ BOSS FLOOR ⚠',GW/2,GH/2-20);
    ctx.fillStyle='#f88';ctx.font='9px monospace';ctx.fillText('DARK LORD APPROACHES',GW/2,GH/2+4);
    ctx.fillStyle='#f44';ctx.font='8px monospace';ctx.fillText('壁を壊す前にボスを倒せ',GW/2,GH/2+22);
    ctx.textAlign='left';return;
  }
  if(gamePhase==='title'){drawTitle();return;}

  if(gamePhase==='bonusSelect'){
    drawBonusCards('BONUS!',`撃破ボーナス / ${getW().name}に乗せる`,BC_SY,'#fa0');
    return;
  }
  if(gamePhase==='stageBonus'){
    drawBonusCards('STAGE CLEAR! BONUS',`${getW().name}に乗せる`,BC_SY,'#4f4');
    ctx.fillStyle='#555';ctx.font='7px monospace';ctx.textAlign='center';
    ctx.fillText('選んだら次ステージへ',GW/2,GH-16);ctx.textAlign='left';
    return;
  }

  if(gamePhase==='weaponSelect'){
    ctx.fillStyle='rgba(0,0,0,0.93)';ctx.fillRect(0,0,GW,GH);
    ctx.textAlign='center';
    if(selWeapon===null){
      ctx.fillStyle='#fa0';ctx.font='bold 12px monospace';ctx.fillText('STAGE CLEAR! 武器選択',GW/2,26);
      ctx.fillStyle='#aaa';ctx.font='8px monospace';ctx.fillText(`FL${S.floor+1}は武器選択フロア`,GW/2,42);
      const {cw,ch,gap,sy}=WC,sx=WC.sx();
      weaponChoices.forEach((wc,i)=>{
        const cx=sx+i*(cw+gap);
        ctx.fillStyle=wc.keep?'#0a1a0a':'#111';ctx.fillRect(cx,sy,cw,ch);
        ctx.strokeStyle=wc.keep?'#4f4':'#444';ctx.lineWidth=1;ctx.strokeRect(cx,sy,cw,ch);
        if(wc.keep){ctx.fillStyle='#4f4';ctx.font='bold 6px monospace';ctx.fillText('✔KEEP',cx+cw/2,sy+11);}
        ctx.fillStyle=BASE_WEAPONS[wc.key].color;ctx.font='bold 7px monospace';
        ctx.fillText(wc.name,cx+cw/2,wc.keep?sy+24:sy+16);
        ctx.fillStyle='#888';ctx.font='6px monospace';
        ctx.fillText(wc.keep?'現在':'新しい',cx+cw/2,sy+33);
        const st=wc.keep?S.wStats[wc.key]:BASE_WEAPONS[wc.key];
        ctx.fillStyle='#aaa';
        ctx.fillText(`DMG×${st.dmgM.toFixed(2)}`,cx+cw/2,sy+46);
        ctx.fillText(`R:${st.range}`,cx+cw/2,sy+57);
        ctx.fillText(`弾:${st.pellets}`,cx+cw/2,sy+68);
        ctx.fillStyle=st.pierce?'#4ff':'#4fa';
        ctx.fillText(st.pierce?'貫通':BASE_WEAPONS[wc.key].detail,cx+cw/2,sy+80);
      });
      ctx.fillStyle='#555';ctx.font='7px monospace';ctx.fillText('武器を選んだらボーナスも選択',GW/2,GH-16);
    } else {
      ctx.fillStyle='#fa0';ctx.font='bold 12px monospace';ctx.fillText('STAGE CLEAR! ボーナス選択',GW/2,26);
      ctx.fillStyle='#aaa';ctx.font='8px monospace';ctx.fillText(`武器: ${BASE_WEAPONS[selWeapon].name}に乗せる`,GW/2,42);
      const cw=88,ch=80,gap=8,total=cw*3+gap*2,sx=(GW-total)/2,sy=175;
      bonusChoices.forEach((b,i)=>{
        const cx=sx+i*(cw+gap);
        ctx.fillStyle='#111';ctx.fillRect(cx,sy,cw,ch);
        ctx.strokeStyle='#4f4';ctx.lineWidth=1;ctx.strokeRect(cx,sy,cw,ch);
        ctx.fillStyle='#4f4';ctx.font='bold 8px monospace';ctx.fillText(b.name,cx+cw/2,sy+22);
        ctx.fillStyle='#888';ctx.font='7px monospace';ctx.fillText(b.desc,cx+cw/2,sy+40);
      });
      ctx.fillStyle='#555';ctx.font='7px monospace';ctx.fillText('タップして選択',GW/2,GH-16);
    }
    ctx.textAlign='left';return;
  }

  if(gamePhase==='shop'){
    ctx.fillStyle='rgba(0,0,0,0.93)';ctx.fillRect(0,0,GW,GH);
    ctx.fillStyle='#c40';ctx.font='bold 13px monospace';ctx.textAlign='center';
    ctx.fillText('DARK SHOP',GW/2,46);
    ctx.fillStyle='#aaa';ctx.font='8px monospace';ctx.fillText(`FL${S.floor}はショップフロア`,GW/2,62);
    ctx.fillStyle='#fd0';ctx.font='9px monospace';ctx.fillText(`所持金: ${S.gold}G`,GW/2,78);
    shopItems.forEach((item,i)=>{
      const bx=GW/2-95,by=SHOP_BY+i*58,bw=190,bh=48;
      const ok=!item.bought&&S.gold>=item.price;
      ctx.fillStyle=item.bought?'#1a1a1a':ok?'#1a0800':'#111';ctx.fillRect(bx,by,bw,bh);
      ctx.strokeStyle=item.bought?'#333':ok?'#c40':'#333';ctx.lineWidth=1;ctx.strokeRect(bx,by,bw,bh);
      ctx.fillStyle=item.bought?'#555':ok?'#fa0':'#666';
      ctx.font='bold 9px monospace';ctx.fillText(item.bought?'SOLD':item.name,GW/2,by+16);
      ctx.fillStyle='#888';ctx.font='7px monospace';ctx.fillText(item.desc,GW/2,by+30);
      ctx.fillStyle=ok?'#fd0':'#555';ctx.fillText(`${item.price}G`,GW/2,by+42);
    });
    ctx.fillStyle='#336';ctx.fillRect(GW/2-55,GH-62,110,26);
    ctx.fillStyle='#fff';ctx.font='bold 9px monospace';
    ctx.fillText(S.isBoss?'⚠ BOSSステージへ':'次のステージへ',GW/2,GH-45);
    ctx.textAlign='left';return;
  }

  if(gamePhase==='gameover'){
    ctx.fillStyle='rgba(0,0,0,0.93)';ctx.fillRect(0,0,GW,GH);
    ctx.fillStyle='#f22';ctx.font='bold 24px monospace';ctx.textAlign='center';
    ctx.fillText('YOU DIED',GW/2,GH/2-80);
    ctx.fillStyle='#888';ctx.font='8px monospace';
    [`到達フロア: ${S.floor}`,`総キル数: ${S.kills}`,`総ダメージ: ${S.totalDmg.toLocaleString()}`,`所持金: ${S.gold}G`,`スコア: ${S.score.toLocaleString()}`]
      .forEach((l,i)=>ctx.fillText(l,GW/2,GH/2-40+i*18));
    ctx.fillStyle='#f84';ctx.font='bold 10px monospace';ctx.fillText('タップで再挑戦',GW/2,GH/2+60);
    ctx.textAlign='left';return;
  }
}

function drawTitle(){
  ctx.fillStyle='#08080f';ctx.fillRect(0,0,GW,GH);
  ctx.fillStyle='rgba(80,0,100,0.15)';for(let i=0;i<GW;i+=32)ctx.fillRect(i,0,1,GH);
  ctx.fillStyle='#c40';ctx.font='bold 28px monospace';ctx.textAlign='center';
  ctx.fillText('DARK DESCENT',GW/2,GH/2-90);
  ctx.fillStyle='#555';ctx.font='8px monospace';ctx.fillText('— ROGUELIKE FALLING SHOOTER —',GW/2,GH/2-68);
  ctx.fillStyle='#999';ctx.font='8px monospace';
  ctx.fillText('壁を撃って壊してゴールへ',GW/2,GH/2-44);
  ctx.fillText('5kill毎ボーナス / 3FL毎ショップ / 4FL毎武器選択',GW/2,GH/2-28);
  ctx.fillStyle='#444';ctx.font='7px monospace';ctx.fillText('← → 移動  SPACE/Z: 射撃（反動で浮く）',GW/2,GH/2-8);
  if(Math.sin(frame*0.08)>0){ctx.fillStyle='#f84';ctx.font='bold 11px monospace';ctx.fillText('タップ / キーでスタート',GW/2,GH/2+22);}
  ctx.textAlign='left';
}

function loop(){frame++;update();draw();requestAnimationFrame(loop);}
loop();
</script>
</body>
</html>
